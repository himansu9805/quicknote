name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Generate version info
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          python scripts/make_version_info.py $version

      - name: Build executable
        run: pyinstaller QuickNote.spec --clean

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$version installer\quicknote.iss

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          gh release create ${{ github.ref_name }} "dist\QuickNote-Setup-$version.exe" --generate-notes --title "QuickNote ${{ github.ref_name }}"
